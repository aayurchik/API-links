version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: shortlink_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-password}  
      POSTGRES_DB: ${DB_NAME:-shortlink}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shortlink_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  celery:
    build: .
    container_name: celery_app
    command: celery -A src.tasks.celery worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
    volumes:
      - .:/app

  celery-beat:
    build: .
    container_name: celery_beat
    command: celery -A src.tasks.celery beat --loglevel=info
    depends_on:
      - redis
      - celery
    env_file:
      - .env
    environment:     
      - REDIS_HOST=redis
      - DB_HOST=postgres
    volumes:
      - .:/app

  flower:
    build: .
    container_name: flower_app
    command: celery -A src.tasks.celery flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery
    env_file:
      - .env
    environment:   
      - REDIS_HOST=redis
      - DB_HOST=postgres
    volumes:
      - .:/app

  app:
    build: .
    container_name: fastapi_app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data: